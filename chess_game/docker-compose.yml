services:
  server:
    build: .
    container_name: chess-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_DRIVER: postgres
      DB_URL: postgresql://chess:${DB_PASSWORD:-chesspass}@postgres:5432/chess_game?sslmode=disable
      SERVER_ADDRESS: 0.0.0.0:8080
      ACCESS_TOKEN_DURATION: 15m
      TOKEN_SYMMETRIC_KEY: ${TOKEN_SYMMETRIC_KEY:?TOKEN_SYMMETRIC_KEY must be set}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      PUBLIC_HOST: ${PUBLIC_HOST}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      CLOUDFLARE_TURN_KEY_ID: ${CLOUDFLARE_TURN_KEY_ID}
      CLOUDFLARE_TURN_API_TOKEN: ${CLOUDFLARE_TURN_API_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chess-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:18-alpine
    container_name: chess-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chesspass}
      POSTGRES_DB: chess_game
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - chess-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d chess_game"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

networks:
  chess-net:
    driver: bridge
