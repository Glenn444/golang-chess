basePath: /
definitions:
  api.ConfirmEmail:
    properties:
      email:
        type: string
      email_otp:
        type: string
    required:
    - email
    - email_otp
    type: object
  api.ConfirmEmailResponse:
    properties:
      email:
        type: string
      message:
        type: string
    type: object
  api.CreateGameReq:
    properties:
      opponent:
        enum:
        - person
        - stockfish
        type: string
      player_color:
        enum:
        - w
        - b
        type: string
    required:
    - opponent
    - player_color
    type: object
  api.CreateUserRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        maxLength: 30
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  api.CreateUserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      password_changed_at:
        type: string
      username:
        type: string
    type: object
  api.ICEServer:
    properties:
      credential:
        type: string
      urls:
        items:
          type: string
        type: array
      username:
        type: string
    type: object
  api.LoginUserRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  api.LoginUserResponse:
    properties:
      access_token:
        type: string
      last_login_at:
        type: string
      password_changed_at:
        type: string
      refresh_token:
        type: string
      username:
        type: string
    type: object
  api.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  api.RefreshTokenResponse:
    properties:
      access_token:
        type: string
      message:
        type: string
    type: object
  api.SendChatMessageReq:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
    required:
    - content
    type: object
  api.SendEmailOTP:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  api.SendEmailOTPResp:
    properties:
      email:
        type: string
      msg:
        type: string
    type: object
  api.cloudflareICEResponse:
    properties:
      iceServers:
        items:
          $ref: '#/definitions/api.ICEServer'
        type: array
    type: object
  api.getMeResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      email_confirmed:
        type: boolean
      is_active:
        type: boolean
      last_login_at:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Multiplayer chess game server with WebSocket real-time gameplay, chat,
    and voice signalling.
  title: Chess Game API
  version: 1.0.0
paths:
  /:
    get:
      description: Returns a welcome message.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Welcome
      tags:
      - General
  /games:
    get:
      consumes:
      - application/json
      description: Returns all games waiting for a second player.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: List waiting games
      tags:
      - Games
    post:
      consumes:
      - application/json
      description: Creates a new chess game. Choose your color (w/b) and opponent
        type.
      parameters:
      - description: Game creation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateGameReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Create a game
      tags:
      - Games
  /games/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a game and all associated moves/chat. Only a participant
        can delete their game.
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Delete a game
      tags:
      - Games
    get:
      consumes:
      - application/json
      description: Returns a game by its UUID.
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get a game
      tags:
      - Games
  /games/{id}/chat:
    get:
      consumes:
      - application/json
      description: Returns the chat history for a game.
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get chat messages
      tags:
      - Chat
    post:
      consumes:
      - application/json
      description: Sends a chat message in a game. The message is broadcast to all
        players via WebSocket.
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      - description: Chat message
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.SendChatMessageReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Send chat message
      tags:
      - Chat
  /games/{id}/join:
    post:
      consumes:
      - application/json
      description: Joins a waiting game as the second player.
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Join a game
      tags:
      - Games
  /games/{id}/moves:
    get:
      consumes:
      - application/json
      description: Returns the move history for a game.
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get game moves
      tags:
      - Games
  /games/{id}/resign:
    post:
      consumes:
      - application/json
      description: Resigns from an active game.
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Resign from a game
      tags:
      - Games
  /games/{id}/voice:
    get:
      consumes:
      - application/json
      description: Returns the active voice session for a game, if one exists.
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get active voice session
      tags:
      - Voice
    post:
      consumes:
      - application/json
      description: Initiates a WebRTC voice call in a game. Signalling travels over
        WebSocket.
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Start voice session
      tags:
      - Voice
  /games/{id}/voice/{vid}:
    delete:
      consumes:
      - application/json
      description: Ends a voice session. Either player in the game can end the call.
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      - description: Voice session UUID
        in: path
        name: vid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: End voice call
      tags:
      - Voice
  /games/{id}/voice/{vid}/activate:
    patch:
      consumes:
      - application/json
      description: Accepts an incoming voice call. Only the non-initiating player
        can accept.
      parameters:
      - description: Game UUID
        in: path
        name: id
        required: true
        type: string
      - description: Voice session UUID
        in: path
        name: vid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Accept voice call
      tags:
      - Voice
  /games/mine:
    get:
      consumes:
      - application/json
      description: Returns all games the current user is participating in.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: List my games
      tags:
      - Games
  /healthz:
    get:
      description: Returns server liveness status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - Health
  /readyz:
    get:
      description: Checks database connectivity and returns readiness status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness check
      tags:
      - Health
  /turn-credentials:
    get:
      description: Returns short-lived Cloudflare TURN credentials for WebRTC voice
        calls.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.cloudflareICEResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get TURN credentials
      tags:
      - Voice
  /users/check-username:
    get:
      consumes:
      - application/json
      description: Returns whether a username is taken or available.
      parameters:
      - description: Username to check
        in: query
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Check username availability
      tags:
      - Users
  /users/confirm-email:
    post:
      consumes:
      - application/json
      description: Verifies email address with the 6-digit OTP code.
      parameters:
      - description: OTP payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ConfirmEmail'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ConfirmEmailResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Confirm email
      tags:
      - Auth
  /users/me:
    get:
      consumes:
      - application/json
      description: Returns the authenticated user's profile.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.getMeResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get current user
      tags:
      - Users
  /users/refresh-token:
    post:
      consumes:
      - application/json
      description: Issues a new access token using a valid refresh token.
      parameters:
      - description: Refresh token payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.RefreshTokenResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh token
      tags:
      - Auth
  /users/send-emailotp:
    post:
      consumes:
      - application/json
      description: Resends the OTP verification code to the user's email.
      parameters:
      - description: Email payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.SendEmailOTP'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SendEmailOTPResp'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Send OTP
      tags:
      - Auth
  /users/signin:
    post:
      consumes:
      - application/json
      description: Authenticates with email and password. Returns access + refresh
        tokens.
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.LoginUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.LoginUserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Sign in
      tags:
      - Auth
  /users/signup:
    post:
      consumes:
      - application/json
      description: Creates an account and sends a 6-digit OTP to the provided email.
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CreateUserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - Auth
securityDefinitions:
  Bearer:
    description: JWT Bearer token. Prefix with "Bearer ".
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
